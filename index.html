<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1Pane | Service monitoring in one dashboard</title>
  <meta name="description" content="Stop chasing status pages. Monitor websites, APIs and services in one dashboard with 1Pane." />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0b1020;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .wordmark {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .subline {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    input[type="email"] {
      flex: 1;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    input[type="email"]::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    input[type="email"]:focus {
      border-color: rgba(255, 255, 255, 0.35);
    }

    input[type="submit"] {
      background: #ffffff;
      border: none;
      border-radius: 8px;
      color: #0b1020;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    input[type="submit"]:hover {
      opacity: 0.88;
    }

    .powered-by {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .powered-by a {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .powered-by a:hover {
      color: rgba(255, 255, 255, 0.55);
    }

    @media (max-width: 480px) {
      form {
        flex-direction: column;
      }

      input[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="wordmark">1Pane</p>

    <h1>Stop chasing status pages.</h1>

    <p class="subline">Monitor websites, APIs and services in one dashboard.</p>

    <form
      action="https://buttondown.com/api/emails/embed-subscribe/user618"
      method="post"
      class="embeddable-buttondown-form"
    >
      <input type="email" name="email" id="bd-email" placeholder="Enter your email" required />
      <input type="submit" value="Join early access" />
    </form>

    <p class="powered-by">
      Powered by <a href="https://buttondown.com/refer/user618" target="_blank" rel="noopener noreferrer">Buttondown</a>
    </p>
  </div>
</body>
</html>
