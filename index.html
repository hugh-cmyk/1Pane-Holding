<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1Pane.io | Service monitoring in one dashboard</title>
  <meta name="description" content="Stop chasing status pages. Monitor websites, APIs and services in one dashboard with 1Pane.io." />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    /* Large prominent wordmark */
    .wordmark {
      font-size: clamp(2.25rem, 7.5vw, 3.75rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #1a1a1a;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #e5e5e5;
      margin: 0 auto 2rem;
    }

    h1 {
      font-size: clamp(1.25rem, 3.5vw, 1.6rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
    }

    .subline {
      font-size: 1rem;
      color: #717171;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    input[type="email"] {
      flex: 1;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 0.9rem;
      font-family: inherit;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    input[type="email"]::placeholder {
      color: #a3a3a3;
    }

    input[type="email"]:focus {
      border-color: #a3a3a3;
    }

    input[type="submit"] {
      background: #1a1a1a;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      padding: 0.7rem 1.25rem;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    input[type="submit"]:hover {
      opacity: 0.75;
    }

    @media (max-width: 480px) {
      form {
        flex-direction: column;
      }

      input[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <p class="wordmark">1Pane.io</p>

    <div class="divider"></div>

    <h1>Stop chasing status pages.</h1>

    <p class="subline">Monitor websites, APIs and services in one dashboard.</p>

    <form
      action="https://buttondown.com/api/emails/embed-subscribe/user618"
      method="post"
      class="embeddable-buttondown-form"
    >
      <input type="email" name="email" id="bd-email" placeholder="Enter your email" required />
      <input type="submit" value="Join early access" />
    </form>

  </div>
</body>
</html>
